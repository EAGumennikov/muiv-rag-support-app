<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | MUIV RAG Support App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{{ url_for('index') }}">MUIV RAG Support App</a>
            <nav class="main-nav">
                <a href="{{ url_for('index') }}">Главная</a>
                <a href="{{ url_for('about') }}">О системе</a>
            </nav>
        </div>
    </header>

    <main class="container page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Учебный прототип системы управления знаниями службы поддержки пользователей.</p>
        </div>
    </footer>
</body>
</html>
